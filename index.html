<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Voice Recorder - MP3 Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e2e2e2;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .container { 
            width: 340px; background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 25px; text-align: center;
        }
        .header-dots { display: flex; gap: 7px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        
        #status { font-size: 0.85rem; font-weight: 600; color: #888; margin-bottom: 25px; letter-spacing: 0.5px; }
        #status.active { color: #ff3b30; }

        .main-btn { 
            font-size: 1.1rem; font-weight: 600; padding: 20px;
            cursor: pointer; border: none; border-radius: 15px; width: 100%;
            background: #007aff; color: white; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .main-btn.recording { background: #ff3b30; box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
        .main-btn:active { transform: scale(0.97); }

        .time-display { font-size: 2rem; font-weight: 200; color: #333; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-dots">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    </div>
    
    <div id="status">MP3 RECORDER</div>
    <div id="timer" class="time-display">00:00</div>

    <button id="recordBtn" class="main-btn">🎤 録音開始</button>
</div>

<script>
    let stream = null;
    let audioContext = null;
    let processor = null;
    let source = null;
    let mp3Encoder = null;
    let mp3Data = [];
    let startTime = null;
    let timerInterval = null;
    let isRecording = false;

    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const btn = document.getElementById('recordBtn');

    function updateTimer() {
        const diff = new Date(new Date() - startTime);
        const m = String(diff.getMinutes()).padStart(2, '0');
        const s = String(diff.getSeconds()).padStart(2, '0');
        timerEl.innerText = `${m}:${s}`;
    }

    async function startRecording() {
        try {
            // マイク取得（許可はここでの1回だけになります）
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // MP3エンコーダーの準備 (44.1kHz, 128kbps)
            mp3Encoder = new lamejs.Mp3Encoder(1, 44100, 128);
            mp3Data = [];

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
            source = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                const left = e.inputBuffer.getChannelData(0);
                // Float32をInt16に変換
                const int16Array = new Int16Array(left.length);
                for (let i = 0; i < left.length; i++) {
                    int16Array[i] = left[i] < 0 ? left[i] * 0x8000 : left[i] * 0x7FFF;
                }
                const mp3buf = mp3Encoder.encodeBuffer(int16Array);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);

            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);
            isRecording = true;

            btn.innerText = "■ 停止してMP3保存";
            btn.classList.add('recording');
            statusEl.innerText = "● RECORDING (MP3)";
            statusEl.classList.add('active');
        } catch (e) {
            alert("マイクの許可が必要です。GitHub Pages(https)で開いているか確認してください。");
        }
    }

    function stopRecording() {
        const endBuf = mp3Encoder.flush();
        if (endBuf.length > 0) mp3Data.push(endBuf);

        const blob = new Blob(mp3Data, { type: 'audio/mp3' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Memo_${new Date().getTime()}.mp3`;
        a.click();

        // クリーンアップ
        processor.disconnect();
        source.disconnect();
        stream.getTracks().forEach(track => track.stop());
        clearInterval(timerInterval);
        isRecording = false;
        
        btn.innerText = "🎤 録音開始";
        btn.classList.remove('recording');
        statusEl.innerText = "SAVED";
        statusEl.classList.remove('active');
        timerEl.innerText = "00:00";
    }

    btn.onclick = () => {
        if (!isRecording) {
            startRecording();
        } else {
            stopRecording();
        }
    };
</script>
</body>
</html>
