<script>
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isWorking = false;

    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startStopBtn');
    const resultArea = document.getElementById('resultArea');

    // 文字起こし設定の改善
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        resultArea.value = "❌ お使いのブラウザは音声認識に対応していません。";
    }
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;
    recognition.interimResults = true;

    // --- エラー診断機能を追加 ---
    recognition.onerror = (event) => {
        console.error("Speech Recognition Error:", event.error);
        if (event.error === 'not-allowed') {
            resultArea.value = "❌ マイクの使用が許可されていません。ブラウザの設定を確認してください。";
        } else if (event.error === 'network') {
            resultArea.value = "❌ ネットワークエラーです。音声認識にはインターネット接続が必要です。";
        } else {
            resultArea.value = "⚠️ エラー発生: " + event.error;
        }
    };

    async function stopAndSave() {
        try { recognition.stop(); } catch(e) {}
        if (mediaRecorder) mediaRecorder.stop();
        
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }

        isWorking = false;
        btn.innerText = "🎤 記録開始 (録音＆文字起こし)";
        btn.classList.remove('recording');
        statusEl.innerText = "SAVED";
        statusEl.classList.remove('active');
    }

    btn.onclick = async () => {
        if (isWorking) {
            stopAndSave();
            return;
        }

        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const now = new Date().getTime();
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                saveFile(audioBlob, `Memo_${now}.mp3`);
                if (resultArea.value && !resultArea.value.startsWith('❌')) {
                    const textBlob = new Blob([resultArea.value], {type:'text/plain'});
                    saveFile(textBlob, `Text_${now}.txt`);
                }
            };

            resultArea.value = "認識中...";
            mediaRecorder.start();
            recognition.start();

            isWorking = true;
            statusEl.innerText = "● RECORDING & TRANSCRIBING";
            statusEl.classList.add('active');
            btn.innerText = "■ 停止して一括保存";
            btn.classList.add('recording');

        } catch (e) {
            alert("マイクの許可が必要です。または、このページを「http」で公開する必要があります。");
        }
    };

    recognition.onresult = (e) => {
        let txt = "";
        for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
        resultArea.value = txt;
    };

    function saveFile(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }

    document.getElementById('pipBtn').onclick = async () => {
        const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 340, height: 450 });
        const style = document.createElement('style');
        style.textContent = document.querySelector('style').textContent;
        pipWindow.document.head.appendChild(style);
        pipWindow.document.body.appendChild(document.querySelector('.container'));
        pipWindow.onpagehide = () => { stopAndSave(); location.reload(); };
    };
</script>
