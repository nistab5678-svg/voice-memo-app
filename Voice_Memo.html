<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Voice Recorder - Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e2e2e2;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .container { 
            width: 340px; background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 25px; text-align: center;
        }
        .header-dots { display: flex; gap: 7px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        
        #status { font-size: 0.85rem; font-weight: 600; color: #888; margin-bottom: 25px; letter-spacing: 0.5px; }
        #status.active { color: #ff3b30; }

        .main-btn { 
            font-size: 1.1rem; font-weight: 600; padding: 20px;
            cursor: pointer; border: none; border-radius: 15px; width: 100%;
            background: #007aff; color: white; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .main-btn.recording { background: #ff3b30; box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
        .main-btn:active { transform: scale(0.97); }

        .time-display { font-size: 2rem; font-weight: 200; color: #333; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-dots">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    </div>
    
    <div id="status">VOICE RECORDER</div>
    <div id="timer" class="time-display">00:00</div>

    <button id="recordBtn" class="main-btn">🎤 録音開始</button>
</div>

<script>
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let startTime = null;
    let timerInterval = null;

    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const btn = document.getElementById('recordBtn');

    function updateTimer() {
        const now = new Date();
        const diff = new Date(now - startTime);
        const m = String(diff.getMinutes()).padStart(2, '0');
        const s = String(diff.getSeconds()).padStart(2, '0');
        timerEl.innerText = `${m}:${s}`;
    }

    async function startRecording() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Recording_${new Date().getTime()}.webm`;
                a.click();
            };

            mediaRecorder.start();
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            btn.innerText = "■ 停止して保存";
            btn.classList.add('recording');
            statusEl.innerText = "● RECORDING";
            statusEl.classList.add('active');
        } catch (e) {
            alert("マイクの許可が必要です。");
        }
    }

    function stopRecording() {
        mediaRecorder.stop();
        stream.getTracks().forEach(track => track.stop());
        clearInterval(timerInterval);
        
        btn.innerText = "🎤 録音開始";
        btn.classList.remove('recording');
        statusEl.innerText = "SAVED";
        statusEl.classList.remove('active');
        timerEl.innerText = "00:00";
    }

    btn.onclick = () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            startRecording();
        } else {
            stopRecording();
        }
    };
</script>
</body>
</html>
